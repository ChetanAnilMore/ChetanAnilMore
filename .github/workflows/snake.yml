name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔥 IMPORTANT (fixes your error)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ChetanAnilMore
          outputs: |
              dist/github-contribution-grid-snake.svg?color_snake=00FFFF&color_dots=#0f0f0f,#00ffff,#00ccff,#0099ff,#0066ff

      - name: Push snake animation
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
